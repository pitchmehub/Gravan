<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <title>Gravan — Composições Musicais</title>
    <meta name="description" content="Marketplace de composições musicais — conectando compositores e intérpretes." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="color-scheme" content="light" />

    <!-- Cor da barra de navegação mobile e do splash screen -->
    <meta name="theme-color" content="#0E2A55" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/gravan-favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/gravan-icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/gravan-icon-16.png" />

    <!-- iOS / Safari -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/gravan-apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/gravan-apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/gravan-apple-touch-icon-167.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gravan" />

    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#0E2A55" />
    <meta name="msapplication-TileImage" content="/icons/gravan-icon-144.png" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
