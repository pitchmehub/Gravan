<!--
  TEMPLATES DE E-MAIL SUPABASE — GRAVAN
  =======================================
  Cole cada bloco no Supabase Dashboard → Authentication → Email Templates.
  Substitua as variáveis {{ .ConfirmationURL }}, {{ .Token }}, etc. exatamente
  como estão — o Supabase as preenche automaticamente.
  
  TIPOS DISPONÍVEIS NO DASHBOARD:
    1. Confirm signup        → use: CONFIRMAÇÃO DE CADASTRO
    2. Reset Password        → use: REDEFINIÇÃO DE SENHA
    3. Magic Link            → use: MAGIC LINK (acesso sem senha)
    4. Email Change          → use: ALTERAÇÃO DE E-MAIL
-->

<!-- ================================================================
     1. CONFIRMAÇÃO DE CADASTRO (Confirm signup)
     Subject: Confirme seu e-mail — Gravan
     ================================================================ -->
<template id="confirm-signup">
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Confirme seu e-mail — Gravan</title>
</head>
<body style="margin:0;padding:0;background-color:#F4F4F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#F4F4F5;padding:32px 0;">
  <tr><td align="center">
    <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);">

      <!-- HEADER -->
      <tr>
        <td style="background-color:#09090B;padding:28px 40px;text-align:center;">
          <span style="font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">GRAVAN</span>
          <p style="margin:4px 0 0;font-size:11px;color:#A1A1AA;letter-spacing:2px;text-transform:uppercase;">Mercado de Obras Musicais</p>
        </td>
      </tr>

      <!-- ACCENT BAR -->
      <tr><td style="height:4px;background:linear-gradient(90deg,#7C3AED 0%,#4F46E5 100%);"></td></tr>

      <!-- BODY -->
      <tr>
        <td style="padding:40px 40px 32px;">
          <h2 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#09090B;">Confirme seu endereço de e-mail</h2>
          <p style="margin:0 0 24px;font-size:14px;color:#52525B;line-height:1.6;">
            Seja bem-vindo(a) à Gravan! Para ativar sua conta e começar a explorar o mercado de obras musicais, clique no botão abaixo.
          </p>

          <!-- CTA BUTTON -->
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
            <tr>
              <td style="background-color:#7C3AED;border-radius:8px;">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:8px;">
                  Confirmar meu e-mail
                </a>
              </td>
            </tr>
          </table>

          <!-- ALERT -->
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 24px;">
            <tr>
              <td style="background-color:#EDE9FE;border-left:4px solid #7C3AED;border-radius:0 6px 6px 0;padding:12px 16px;">
                <p style="margin:0;font-size:13px;color:#4C1D95;line-height:1.5;">
                  Se você não criou uma conta na Gravan, ignore este e-mail. Nenhuma ação é necessária da sua parte.
                </p>
              </td>
            </tr>
          </table>

          <p style="margin:0;font-size:13px;color:#71717A;line-height:1.5;">
            O link de confirmação expira em 24 horas. Caso expire, acesse a Gravan e solicite um novo link.
          </p>
        </td>
      </tr>

      <!-- FOOTER -->
      <tr>
        <td style="background-color:#F4F4F5;padding:20px 40px;text-align:center;border-top:1px solid #E4E4E7;">
          <p style="margin:0;font-size:12px;color:#A1A1AA;">
            Gravan — Mercado de Obras Musicais Brasileiras<br>
            <a href="https://www.gravan.com.br" style="color:#7C3AED;text-decoration:none;">www.gravan.com.br</a>
          </p>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>
</template>

                </p>
              </td>
            </tr>
          </table>

          <p style="margin:0;font-size:13px;color:#71717A;line-height:1.5;">
            Por segurança, nunca compartilhe este link com ninguém. A equipe Gravan jamais solicitará sua senha.
          </p>
        </td>
      </tr>

      <!-- FOOTER -->

        <td style="background-color:#F4F4F5;padding:20px 40px;text-align:center;border-top:1px solid #E4E4E7;">

            Gravan — Mercado de Obras Musicais Brasileiras<br>

          </p>
        </td>
      </tr>

    </table>
  </td></tr>
</table>
</body>
</html>
</template>
